name: PCS CFTLib Test

on:
  pull_request:
  merge_group:

jobs:
  pcs-cftlib-test:
    runs-on: ubuntu-latest
    environment: cftlib-acr-pull
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Determine whether change is docs-only
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --prune --depth=1 origin "$base" "$head"
          files=$(git diff --name-only "$base" "$head")
          if [ -z "$files" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$files" | grep -vE '\.md$' >/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Docs-only change detected
        if: steps.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; skipping PCS CFTLib test."

      - name: Set up JDK
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Az CLI login
        if: steps.changes.outputs.docs_only != 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: 82f79201-9a30-4160-b264-7bbed775c7f4
          tenant-id: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
          allow-no-subscriptions: true

      - name: ACR Login
        if: steps.changes.outputs.docs_only != 'true'
        run: az acr login --name hmctsprod

      - name: Run pcs:cftlibTest
        if: steps.changes.outputs.docs_only != 'true'
        run: ./gradlew pcs:cftlibTest -i
