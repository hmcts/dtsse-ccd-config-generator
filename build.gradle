tasks.register('check') {
    gradle.includedBuilds.each { included ->
        dependsOn(included.task(':check'))
    }
}

tasks.register('allTests')

gradle.afterProject { project, _ ->
    def aggregate = project.rootProject.tasks.named('allTests')
    ['test', 'integration', 'cftlibTest'].each { taskName ->
        project.tasks.matching { it.name == taskName }.configureEach { task ->
            if ((project.path == ':nfdiv' && taskName == 'cftlibTest')
                || (project.path == ':sptribs' && taskName == 'cftlibTest')
                || project.path == ':ccd-data-store-api') {
                return
            }
            aggregate.configure { dependsOn(task) }
        }
    }
}

tasks.register('publishToMavenLocal') { task ->
    gradle.includedBuilds.each { included ->
        task.dependsOn(included.task(':publishToMavenLocal'))
    }
    subprojects.each { subproject ->
        task.dependsOn(subproject.tasks.matching { it.name == 'publishToMavenLocal' })
    }
}

tasks.register('publishToAzureArtifacts') { task ->
    def includedBuildsToPublish = ['sdk']
    gradle.includedBuilds.each { included ->
        if (includedBuildsToPublish.contains(included.name)) {
            task.dependsOn(included.task(':publishToAzureArtifacts'))
        }
    }
    subprojects.each { subproject ->
        task.dependsOn(
            subproject.tasks.matching { it.name.endsWith('ToAzureArtifactsRepository') }
        )
    }
}

def configurePostgresClientTools = { task ->
    ['/opt/homebrew/opt/libpq/bin', '/usr/local/opt/libpq/bin'].find {
        file("${it}/pg_dump").exists()
    }.with {
        if (it != null) {
            task.environment 'PG_DUMP_BIN', "${it}/pg_dump"
            task.environment 'PSQL_BIN', "${it}/psql"
            task.environment 'CREATEDB_BIN', "${it}/createdb"
            task.environment 'DROPDB_BIN', "${it}/dropdb"
        }
    }
}

tasks.register('verifyCcdMigration', Exec) {
    group = 'verification'
    description = 'Validates the classic and FDW CCD migration scripts after the e2e environment is up'
    dependsOn ':e2e:dumpCCDDefinitions'
    dependsOn 'verifyCcdMigrationFdw'
    workingDir projectDir
    configurePostgresClientTools(it)
    commandLine 'bash', '-lc', './scripts/test-migrate-ccd-data.sh'
}

tasks.register('verifyCcdMigrationFdw', Exec) {
    group = 'verification'
    description = 'Validates and applies the FDW CCD migration scripts after the e2e environment is up'
    dependsOn ':e2e:dumpCCDDefinitions'
    workingDir projectDir
    configurePostgresClientTools(it)
    commandLine 'bash', '-lc', './scripts/test-migrate-ccd-data-fdw.sh'
}

afterEvaluate {
    subprojects.each { subproject ->
        if (subproject.tasks.findByName('check')) {
            tasks.check.dependsOn subproject.tasks.check
        }
    }
}

subprojects.each { subproject ->
    subproject.afterEvaluate {
        it.tasks.configureEach { task ->
            if (task.name.equals("writeManifestRuntime")) {
                // Ensure the local SDK projects are packaged so they appear on the manifest classpath
                task.dependsOn gradle.includedBuild('sdk').task(':ccd-config-generator:jar')
                task.dependsOn gradle.includedBuild('sdk').task(':decentralised-runtime:jar')
                task.dependsOn gradle.includedBuild('sdk').task(':ccd-runtime-indexing:jar')
                task.dependsOn gradle.includedBuild('sdk').task(':ccd-servicebus-support:jar')
                task.dependsOn gradle.includedBuild('sdk').task(':task-management:jar')
            }
        }
    }
}

// Local dev setup; soft dependency on data store is used overriding cftlib version if present.
if (project.findProject(':ccd-data-store-api')) {
    subprojects.each { subproject ->
        subproject.afterEvaluate {
            it.tasks.each {
                if (it.name.equals("writeManifestccd-data-store-api")) {
                    it.dependsOn(':ccd-data-store-api:jar')
                }
            }
        }
    }
}
